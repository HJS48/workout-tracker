name: Sync Database Schema

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Export schema via SQL
        env:
          DATABASE_URL: postgresql://postgres.xwfshemzhunaxbzjgata:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require
        run: |
          psql "$DATABASE_URL" -f - > schema.sql << 'EOF'
          -- Tables
          SELECT
            'CREATE TABLE ' || table_name || ' (' ||
            string_agg(
              column_name || ' ' ||
              data_type ||
              CASE WHEN character_maximum_length IS NOT NULL
                THEN '(' || character_maximum_length || ')' ELSE '' END ||
              CASE WHEN is_nullable = 'NO' THEN ' NOT NULL' ELSE '' END ||
              CASE WHEN column_default IS NOT NULL
                THEN ' DEFAULT ' || column_default ELSE '' END,
              ', '
            ) || ');'
          FROM information_schema.columns
          WHERE table_schema = 'public'
          GROUP BY table_name
          ORDER BY table_name;
          EOF

      - name: Check for changes
        id: changes
        run: |
          if [ ! -s schema.sql ]; then
            echo "Schema file is empty"
            exit 1
          fi
          if git diff --quiet schema.sql 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schema.sql
          git commit -m "chore: sync database schema"
          git push
